// HiFi Player appliance — AirPlay receiver (shairport-sync).
//
// Outputs to the ALSA "default" device. If you use a dedicated USB DAC and the
// UI's device picker points squeezelite at a specific card, set output_device
// here to the same card (e.g. "hw:CARD=USB") so AirPlay uses the DAC too.
// Only one program can hold an exclusive ALSA device at a time, so AirPlay and
// squeezelite/Lyrion play one source at a time (whichever grabs the card).

general = {
	name = "HiFi Player";
	output_backend = "alsa";
};

alsa = {
	output_device = "default";
};
