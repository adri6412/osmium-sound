# HiFi Player appliance — UPnP/DLNA renderer (upmpdcli).
#
# Appears on the network as a UPnP renderer named below; control apps like
# BubbleUPnP can push audio to it. upmpdcli renders through the local MPD
# instance configured in /etc/mpd.conf.

friendlyname = HiFi Player
mpdhost = 127.0.0.1
mpdport = 6600
# Keep things simple: no OpenHome source switching, just plain UPnP AV.
openhome = 1
