[Seat:*]
autologin-user=hifi
autologin-user-timeout=0
user-session=hifi-kiosk
# Disable screensaver / DPMS at the X server level. The cursor is NOT disabled
# here (no -nocursor): hiding is done at the session layer by unclutter, so the
# "Mouse pointer" toggle in Settings can show it for non-touchscreen users.
xserver-command=X -s 0 -dpms
greeter-hide-users=true
