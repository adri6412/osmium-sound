# HiFi Player appliance — MPD as the audio backend for upmpdcli (UPnP/DLNA).
#
# MPD is not used as a music library here; it only provides the renderer audio
# pipeline that upmpdcli drives. It listens on localhost so only upmpdcli (also
# local) talks to it. Audio goes to the ALSA "default" device — change to your
# DAC card if needed (same note as shairport-sync.conf).

music_directory		"/var/lib/mpd/music"
playlist_directory	"/var/lib/mpd/playlists"
db_file			"/var/lib/mpd/tag_cache"
state_file		"/var/lib/mpd/state"
sticker_file		"/var/lib/mpd/sticker.sql"
log_file		"/var/log/mpd/mpd.log"
pid_file		"/run/mpd/pid"
user			"mpd"

bind_to_address		"127.0.0.1"
port			"6600"

audio_output {
	type	"alsa"
	name	"HiFi ALSA"
	device	"default"
}
