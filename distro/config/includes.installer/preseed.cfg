### HiFi Player — automatic, unattended installation preseed.
### The installer clones the live system (which already contains the 'hifi'
### user and all services), so NO user/password questions are asked.
###
### WARNING: this WIPES the first detected disk without further confirmation.

#### Localization (no questions)
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select it

#### Network (auto, fixed hostname)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string hifiplayer
d-i netcfg/get_domain string local
d-i netcfg/hostname string hifiplayer

#### Clock / timezone
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Rome
d-i clock-setup/ntp boolean true

#### Clone the running live system (pulls in user 'hifi', services, app)
d-i live-installer/enable boolean true

#### Users — do NOT create an extra normal account ('hifi' is cloned from the
#### live image). user-setup refuses "no root AND no user", so we enable root
#### with a known password; this stops it from prompting for a user account.
d-i passwd/make-user boolean false
d-i passwd/root-login boolean true
d-i passwd/root-password password hifi
d-i passwd/root-password-again password hifi
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

#### Partitioning — auto-detect the first disk and wipe it.
#### GPT layout that boots on BOTH BIOS and UEFI:
####   1 MB  bios_grub  (BIOS boot on GPT)
####   512MB EFI ESP    (UEFI boot)
####   rest  ext4 /     (root)
d-i partman/early_command string \
  DISK=$(list-devices disk | head -n1); \
  debconf-set partman-auto/disk "$DISK"; \
  debconf-set grub-installer/bootdev "$DISK"

d-i partman-auto/method string regular
d-i partman-auto/expert_recipe string \
      hifi :: \
              1 1 1 free \
                      $iflabel{ gpt } \
                      $reusemethod{ } \
                      method{ biosgrub } \
              . \
              512 512 512 fat32 \
                      $iflabel{ gpt } \
                      method{ efi } format{ } \
              . \
              1024 1000 -1 ext4 \
                      method{ format } format{ } \
                      use_filesystem{ } filesystem{ ext4 } \
                      mountpoint{ / } \
              .

d-i partman-partitioning/choose_label string gpt
d-i partman-partitioning/default_label string gpt
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman-efi/non_efi_system boolean true
d-i partman-basicfilesystems/no_swap boolean false
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

#### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string default
#### UEFI Secure Boot: also install the shim chain to the removable media path
#### (\EFI\BOOT\BOOTX64.EFI) so firmwares that ignore the NVRAM "debian" entry
#### still boot the signed shim. Harmless/ignored on BIOS installs. The signed
#### packages themselves ship in the live filesystem (see package-lists), so the
#### installer sets up shim → grub-efi-amd64-signed automatically on UEFI.
d-i grub-installer/force-efi-extra-removable boolean true

#### Finalize the INSTALLED system: apply the hidden/branded boot config (the
#### installer regenerates GRUB and would overwrite it). Made tolerant so a
#### finalize hiccup can never abort the whole installation.
d-i preseed/late_command string \
  in-target sh -c 'test -f /usr/local/sbin/hifi-finalize-install.sh && sh /usr/local/sbin/hifi-finalize-install.sh; true'

#### Finish — reboot automatically, no final prompt
d-i finish-install/reboot_in_progress note
