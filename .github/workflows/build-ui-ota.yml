name: Build HiFi Player OTA bundles (UI + system)

# Builds two OTA payloads and publishes them as assets of the GitHub Release:
#  • hifi-ui-<ver>.tar.gz     — the Electron UI (unpacked linux dir)
#  • hifi-system-<ver>.tar.gz — the custom system components (Python API/daemons,
#                                helper scripts, systemd units)
# The appliance's OTA updaters (Settings → Aggiornamenti) download these.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ui-ota:
    runs-on: ubuntu-latest

    # Skip if this is a companion app release tag
    if: ${{ !contains(github.ref, 'companion') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + unpacked Electron app
        run: |
          npm run build
          npx electron-builder --linux dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package UI OTA bundle (tarball + sha256)
        id: pack
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          printf '%s\n' "$VERSION" > dist/linux-unpacked/UI_VERSION
          TAR="hifi-ui-${VERSION}.tar.gz"
          tar czf "$TAR" -C dist/linux-unpacked .
          sha256sum "$TAR" > "${TAR}.sha256"
          echo "tarball=$TAR" >> "$GITHUB_OUTPUT"

      - name: Package system-components OTA bundle (tarball + sha256)
        id: packsys
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ROOT=sysbundle
          rm -rf "$ROOT"
          mkdir -p "$ROOT/usr/local/bin" "$ROOT/usr/local/sbin" "$ROOT/etc/systemd/system"
          # Python API + daemons
          cp api_server.py vu_meter_daemon.py sources_server.py "$ROOT/usr/local/bin/"
          # Helper / OTA scripts
          cp distro/config/includes.chroot/usr/local/sbin/*.sh "$ROOT/usr/local/sbin/"
          # systemd units
          cp distro/config/includes.chroot/etc/systemd/system/*.service "$ROOT/etc/systemd/system/"
          printf '%s\n' "$VERSION" > "$ROOT/SYSTEM_VERSION"
          TAR="hifi-system-${VERSION}.tar.gz"
          tar czf "$TAR" -C "$ROOT" .
          sha256sum "$TAR" > "${TAR}.sha256"
          echo "tarball=$TAR" >> "$GITHUB_OUTPUT"

      - name: Package OS OTA bundle (signed tarball + sha256 + signature)
        id: packos
        env:
          OTA_SIGNING_KEY: ${{ secrets.OTA_SIGNING_KEY }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SRC=distro/os-update
          # ship the version actually being released, overriding the placeholder
          printf '%s\n' "$VERSION" > "$SRC/OS_VERSION"
          TAR="hifi-os-${VERSION}.tar.gz"
          # Exclude docs from the runtime payload; keep apply.sh + OS_VERSION + any files/.
          tar czf "$TAR" -C "$SRC" --exclude=README.md .
          # sha256 sidecar — exact bytes the device reconstructs and verifies.
          DIGEST=$(sha256sum "$TAR" | awk '{print $1}')
          printf '%s  %s\n' "$DIGEST" "$TAR" > "${TAR}.sha256"
          # Sign the sidecar with the offline Ed25519 key. Without the secret we
          # skip signing — the device will then refuse the (unsigned) bundle.
          if [ -n "$OTA_SIGNING_KEY" ]; then
            printf '%s' "$OTA_SIGNING_KEY" > /tmp/ota-key.pem
            openssl pkeyutl -sign -inkey /tmp/ota-key.pem -rawin \
              -in "${TAR}.sha256" -out "${TAR}.sha256.sig"
            rm -f /tmp/ota-key.pem
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::OTA_SIGNING_KEY not set — OS bundle published UNSIGNED and will be rejected by devices."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tarball=$TAR" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sha256
            ${{ steps.packsys.outputs.tarball }}
            ${{ steps.packsys.outputs.tarball }}.sha256
            ${{ steps.packos.outputs.tarball }}
            ${{ steps.packos.outputs.tarball }}.sha256
            ${{ steps.packos.outputs.tarball }}.sha256.sig

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: hifi-ota
          path: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sha256
            ${{ steps.packsys.outputs.tarball }}
            ${{ steps.packsys.outputs.tarball }}.sha256
            ${{ steps.packos.outputs.tarball }}
            ${{ steps.packos.outputs.tarball }}.sha256
            ${{ steps.packos.outputs.tarball }}.sha256.sig
          retention-days: 7
