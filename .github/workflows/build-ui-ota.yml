name: Build HiFi Player OTA bundles (UI + system)

# Builds two OTA payloads and publishes them as assets of the GitHub Release:
#  • hifi-ui-<ver>.tar.gz     — the Electron UI (unpacked linux dir)
#  • hifi-system-<ver>.tar.gz — the custom system components (Python API/daemons,
#                                helper scripts, systemd units)
# The appliance's OTA updaters (Settings → Aggiornamenti) download these.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ui-ota:
    runs-on: ubuntu-latest

    # Skip if this is a companion app release tag
    if: ${{ !contains(github.ref, 'companion') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + unpacked Electron app
        run: |
          npm run build
          npx electron-builder --linux dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package UI OTA bundle (tarball + sha256)
        id: pack
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          printf '%s\n' "$VERSION" > dist/linux-unpacked/UI_VERSION
          TAR="hifi-ui-${VERSION}.tar.gz"
          tar czf "$TAR" -C dist/linux-unpacked .
          sha256sum "$TAR" > "${TAR}.sha256"
          echo "tarball=$TAR" >> "$GITHUB_OUTPUT"

      - name: Package system-components OTA bundle (tarball + sha256)
        id: packsys
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ROOT=sysbundle
          rm -rf "$ROOT"
          mkdir -p "$ROOT/usr/local/bin" "$ROOT/usr/local/sbin" "$ROOT/etc/systemd/system"
          # Python API + daemons
          cp api_server.py vu_meter_daemon.py sources_server.py "$ROOT/usr/local/bin/"
          # Helper / OTA scripts
          cp distro/config/includes.chroot/usr/local/sbin/*.sh "$ROOT/usr/local/sbin/"
          # systemd units
          cp distro/config/includes.chroot/etc/systemd/system/*.service "$ROOT/etc/systemd/system/"
          printf '%s\n' "$VERSION" > "$ROOT/SYSTEM_VERSION"
          TAR="hifi-system-${VERSION}.tar.gz"
          tar czf "$TAR" -C "$ROOT" .
          sha256sum "$TAR" > "${TAR}.sha256"
          echo "tarball=$TAR" >> "$GITHUB_OUTPUT"

      - name: Lint + idempotency test for OS update payload
        # Guards the OS-channel contract automatically: shellcheck the runner +
        # helpers + migrations, then prove apply.sh is idempotent — a second run
        # over already-applied state must report changed=0 and request NO reboot
        # (the payload re-runs on every release, so a spurious reboot would
        # reboot every device on every update).
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y shellcheck >/dev/null
          echo "== shellcheck =="
          shellcheck -s sh distro/os-update/apply.sh distro/os-update/lib.sh distro/os-update/apply.d/*.sh
          echo "== idempotency (run apply.sh twice) =="
          export HIFI_OS_VERSION=ci-test
          export HIFI_PAYLOAD_DIR="$PWD/distro/os-update"
          export HIFI_OS_NO_APT=1
          rm -f "$HIFI_PAYLOAD_DIR/REBOOT"
          echo "--- first run (applies) ---"
          sudo -E sh "$HIFI_PAYLOAD_DIR/apply.sh"
          echo "--- second run (must be a clean no-op) ---"
          OUT2="$(sudo -E sh "$HIFI_PAYLOAD_DIR/apply.sh")"
          echo "$OUT2"
          echo "$OUT2" | grep -q 'SUMMARY: changed=0 failed=0 ' \
            || { echo "FAIL: second run reported changes/failures (not idempotent)"; exit 1; }
          echo "$OUT2" | grep -q 'reboot=no' \
            || { echo "FAIL: second run requested a reboot on a no-op"; exit 1; }
          [ ! -f "$HIFI_PAYLOAD_DIR/REBOOT" ] \
            || { echo "FAIL: REBOOT marker present after an idempotent run"; exit 1; }
          echo "OK: OS update payload is idempotent and reboot-clean."

      - name: Package OS OTA bundle (signed tarball + sha256 + signature)
        id: packos
        env:
          OTA_SIGNING_KEY: ${{ secrets.OTA_SIGNING_KEY }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SRC=distro/os-update
          # ship the version actually being released, overriding the placeholder
          printf '%s\n' "$VERSION" > "$SRC/OS_VERSION"
          TAR="hifi-os-${VERSION}.tar.gz"
          # Exclude docs + any runtime scratch the idempotency test left behind;
          # keep apply.sh + lib.sh + apply.d/ + files/ + OS_VERSION.
          tar czf "$TAR" -C "$SRC" \
            --exclude=README.md --exclude=.hifi-state --exclude=REBOOT .
          # sha256 sidecar — exact bytes the device reconstructs and verifies.
          DIGEST=$(sha256sum "$TAR" | awk '{print $1}')
          printf '%s  %s\n' "$DIGEST" "$TAR" > "${TAR}.sha256"
          # Sign the sidecar with the offline Ed25519 key. Without the secret we
          # skip signing — the device will then refuse the (unsigned) bundle.
          if [ -n "$OTA_SIGNING_KEY" ]; then
            printf '%s' "$OTA_SIGNING_KEY" > /tmp/ota-key.pem
            openssl pkeyutl -sign -inkey /tmp/ota-key.pem -rawin \
              -in "${TAR}.sha256" -out "${TAR}.sha256.sig"
            rm -f /tmp/ota-key.pem
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::OTA_SIGNING_KEY not set — OS bundle published UNSIGNED and will be rejected by devices."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tarball=$TAR" >> "$GITHUB_OUTPUT"

      - name: Generate offline dev installer (.sh)
        id: installer
        # DEV releases only (tag with a hyphen, e.g. v2.5.9-dev.8). Produces a
        # self-contained script that applies System + UI (+ OS) for this release
        # over SSH, pulling assets from the release CDN — no api.github.com, so
        # it's immune to the unauthenticated REST rate limit that makes the
        # in-app check intermittently "not find" a new release.
        if: github.ref_type == 'tag' && contains(github.ref_name, '-')
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          OUT="hifi-install-${VERSION}.sh"
          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__REPO__|${{ github.repository }}|g" \
              distro/dev-installer/install.sh.tmpl > "$OUT"
          chmod +x "$OUT"
          echo "installer=$OUT" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          # A tag with a hyphen (e.g. v2.5.7-dev.1) is a prerelease → the dev
          # OTA channel. GitHub's /releases/latest (used by the prod channel)
          # ignores prereleases, so dev builds never reach prod devices.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # The installer glob matches only on dev tags (built above); on prod
          # tags it matches nothing and is silently skipped.
          fail_on_unmatched_files: false
          files: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sha256
            ${{ steps.packsys.outputs.tarball }}
            ${{ steps.packsys.outputs.tarball }}.sha256
            ${{ steps.packos.outputs.tarball }}
            ${{ steps.packos.outputs.tarball }}.sha256
            ${{ steps.packos.outputs.tarball }}.sha256.sig
            hifi-install-*.sh

      # Publish a static release manifest to GitHub Pages so the appliance's
      # update check reads from a CDN (not rate-limited) instead of the
      # api.github.com REST API (60 req/hour/IP). Written per channel: a dev tag
      # updates latest-dev.json, a stable tag updates latest-prod.json.
      - name: Build OTA Pages manifest
        id: manifest
        if: github.ref_type == 'tag'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if printf '%s' "$VERSION" | grep -q '-'; then CH=dev; else CH=prod; fi
          python3 .github/scripts/make-ota-manifest.py \
            "$VERSION" "${{ github.repository }}" "$CH" \
            "${{ steps.pack.outputs.tarball }}" \
            "${{ steps.packsys.outputs.tarball }}" \
            "${{ steps.packos.outputs.tarball }}"
          echo "channel=$CH" >> "$GITHUB_OUTPUT"

      - name: Publish OTA manifest to GitHub Pages
        if: github.ref_type == 'tag'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./manifest-out
          publish_branch: gh-pages
          destination_dir: ota
          keep_files: true          # don't wipe the website already on gh-pages
          cname: osmiumsound.qd.je

      - name: Upload artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: hifi-ota
          path: |
            ${{ steps.pack.outputs.tarball }}
            ${{ steps.pack.outputs.tarball }}.sha256
            ${{ steps.packsys.outputs.tarball }}
            ${{ steps.packsys.outputs.tarball }}.sha256
            ${{ steps.packos.outputs.tarball }}
            ${{ steps.packos.outputs.tarball }}.sha256
            ${{ steps.packos.outputs.tarball }}.sha256.sig
          retention-days: 7
