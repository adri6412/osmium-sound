name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
          publish_branch: gh-pages
          # keep_files (not force_orphan) so deploying the website preserves the
          # OTA manifest the release workflow publishes under ota/ on this same
          # branch. force_orphan would wipe it on every website change.
          keep_files: true
          cname: osmiumsound.qd.je
